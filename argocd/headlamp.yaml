---
# Created up-front so the SA/Secret below can land before ArgoCD finishes syncing.
# ArgoCD's CreateNamespace=true is idempotent — it won't fight us.
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  destination:
    namespace: headlamp
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: 0.42.0
    helm:
      values: |
        # Single pod, web UI for Kubernetes — recommended replacement for
        # the now-archived kubernetes-dashboard project.
        replicaCount: 1
        # Run as the headlamp-admin SA (cluster-admin); its token feeds the kubeconfig below.
        serviceAccount:
          create: false
          name: headlamp-admin
        # Tell Headlamp to load the kubeconfig the initContainer writes at startup.
        # With this set, the login screen is skipped — Headlamp uses the SA token directly.
        config:
          inCluster: false
          extraArgs:
            - "-kubeconfig"
            - "/home/headlamp/.config/Headlamp/kubeconfigs/config"
        service:
          type: NodePort
          port: 80
          nodePort: 30090
        ingress:
          enabled: false
        # Build a kubeconfig with the pod's auto-mounted SA token + CA, so Headlamp
        # boots authenticated. Avoids the "paste your token" antipattern.
        initContainers:
          - name: kubeconfig-init
            image: busybox:1.36
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                CA=$(base64 -w0 < /var/run/secrets/kubernetes.io/serviceaccount/ca.crt 2>/dev/null \
                     || base64 < /var/run/secrets/kubernetes.io/serviceaccount/ca.crt | tr -d '\n')
                cat > /kubeconfig/config <<EOF
                apiVersion: v1
                kind: Config
                clusters:
                  - name: in-cluster
                    cluster:
                      server: https://kubernetes.default.svc
                      certificate-authority-data: ${CA}
                users:
                  - name: headlamp-admin
                    user:
                      token: ${TOKEN}
                contexts:
                  - name: in-cluster
                    context:
                      cluster: in-cluster
                      user: headlamp-admin
                current-context: in-cluster
                EOF
            volumeMounts:
              - name: kubeconfig
                mountPath: /kubeconfig
        volumes:
          - name: kubeconfig
            emptyDir: {}
        volumeMounts:
          - name: kubeconfig
            mountPath: /home/headlamp/.config/Headlamp/kubeconfigs
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 256Mi}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  # Helm renders without API-server defaults; ignore fields managed by kube-controller-manager
  # (probe defaults, dnsPolicy, terminationMessagePath, etc.) so the app reaches Synced.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      managedFieldsManagers:
        - kube-controller-manager
---
# Lab-only admin SA + token. DO NOT use in real environments.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token
