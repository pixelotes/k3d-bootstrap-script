---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: friendlyhello
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {app: friendlyhello}
  template:
    metadata:
      labels: {app: friendlyhello}
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: friendlyhello-config
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: friendlyhello
spec:
  selector: {app: friendlyhello}
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: friendlyhello
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: friendlyhello
                port:
                  number: 80
{{- end }}
