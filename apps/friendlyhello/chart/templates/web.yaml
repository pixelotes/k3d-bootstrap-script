---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: friendlyhello
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: friendlyhello
  template:
    metadata:
      labels:
        app: friendlyhello
      {{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-api-token: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-api-token: |
          {{ printf "{{- with secret %q -}}" .Values.vault.secretPath }}
          export API_TOKEN="{{ printf "{{ .Data.data.%s }}" .Values.vault.secretKey }}"
          {{ "{{- end -}}" }}
      {{- end }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ .Values.vault.role }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              [ -f /vault/secrets/api-token ] && . /vault/secrets/api-token
              echo "API_TOKEN from Vault: ${API_TOKEN:0:8}..."
              exec python app.py
          {{- end }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: friendlyhello-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: friendlyhello
spec:
  selector:
    app: friendlyhello
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: friendlyhello
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: friendlyhello
                port:
                  number: 80
{{- end }}
