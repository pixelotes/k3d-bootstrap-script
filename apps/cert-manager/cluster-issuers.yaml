---
# Bootstrap issuer: self-signs anything. We use it ONLY to mint our own CA below.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Our lab Certificate Authority — signed by the bootstrap issuer above.
# The resulting tls.crt + tls.key end up in Secret 'lab-ca-secret' in cert-manager ns.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: k3s-lab CA
  secretName: lab-ca-secret
  duration: 8760h         # 1 year
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
---
# The actual issuer Ingresses point to. Signs leaf certs with the lab CA above,
# so all certs share a trust root. Add 'lab-ca-secret' to your browser/system
# trust store once and every Ingress cert is trusted.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-ca-secret
