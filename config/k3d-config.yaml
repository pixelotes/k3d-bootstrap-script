---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: k3s-lab
servers: 2
agents: 2
image: rancher/k3s:v1.30.5-k3s1
network: k3d-k3s-lab
ports:
  # Traefik HTTP -> host 8080
  - port: 8080:80
    nodeFilters: [loadbalancer]
  # Traefik HTTPS -> host 8443
  - port: 8443:443
    nodeFilters: [loadbalancer]
  # ArgoCD UI via NodePort -> host 30080
  - port: 30080:30080
    nodeFilters: [loadbalancer]
  # Kubernetes-dashboard via NodePort -> host 30090
  - port: 30090:30090
    nodeFilters: [loadbalancer]
options:
  # We keep both klipper-lb (servicelb) and Traefik enabled.
  # klipper-lb assigns EXTERNAL-IPs to LoadBalancer services so Traefik
  # populates Ingress.status.loadBalancer (otherwise ArgoCD apps with an
  # Ingress stay 'Progressing' forever).
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
